services:
  # Unified Web Service (Backend + Frontend)
  - type: web
    name: gmail-blaster
    env: node
    plan: free
    # Build both: frontend first, then backend dependencies
    buildCommand: cd client && npm install && npm run build && cd ../server && npm install
    startCommand: cd server && node index.js
    envVars:
      - key: NODE_VERSION
        value: 18.x
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://gmail-blaster.onrender.com # Change this to your actual Render URL
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://gmail-blaster.onrender.com/api/gmail/callback # Change this to your actual Render URL
      - key: VITE_API_URL
        value: https://gmail-blaster.onrender.com # Frontend needs to know it's the same URL
